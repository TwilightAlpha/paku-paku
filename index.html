<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PAKU PAKU</title>
<link rel="shortcut icon" href="/paku-icon.png?v=3">
<link rel="icon" type="image/png" sizes="32x32" href="/paku-icon.png?v=3">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
<link rel="apple-touch-icon" sizes="180x180" href="/paku-icon-180.png?v=3">
<style>
  :root { --bg:#000; --blue:#2121ff; --gold:#ffcc33; --cyan:#21ffff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:var(--bg); overflow:hidden; }
  body { display:flex; flex-direction:column; align-items:center; justify-content:center;
         font-family:"Courier New", ui-monospace, monospace; -webkit-user-select:none; user-select:none; }
  #wrap { position:relative; }
  canvas { display:block; image-rendering:pixelated; }
  /* CRT scanlines + vignette — the cabinet feel */
  #scan { position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.45) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0px, rgba(0,0,0,.22) 1px, transparent 1px, transparent 3px);
  }
  #hint { color:#555; font-size:11px; letter-spacing:2px; margin-top:10px; text-transform:uppercase; }
  /* Name entry overlay — real <input> so mobile keyboards appear */
  #nameEntry {
    display:none; position:absolute; left:50%; bottom:7%; transform:translateX(-50%);
    width:min(86%, 260px); z-index:6; text-align:center; pointer-events:auto;
    flex-direction:column; align-items:center; gap:10px;
  }
  #nameEntry.show { display:flex; }
  #nameEntry label {
    display:block; color:var(--gold); font:bold 13px "Courier New", monospace;
    letter-spacing:2px; text-transform:uppercase;
  }
  #nameInput {
    width:100%; background:#0d1b2a; color:var(--gold); border:2px solid var(--cyan);
    font:bold 18px "Courier New", monospace; text-align:center; padding:10px 8px;
    outline:none; border-radius:0; -webkit-appearance:none; appearance:none;
    caret-color:var(--gold); text-transform:none; line-height:1.2;
  }
  #nameInput::placeholder { color:#556; }
  #nameEntry .row { display:flex; gap:10px; justify-content:center; align-items:center; width:100%; }
  #nameSkip {
    background:#000; color:#aaa; border:1px solid #555; font:11px "Courier New", monospace;
    letter-spacing:1px; padding:8px 16px; cursor:pointer; text-transform:uppercase;
  }
  #nameSkip:hover, #nameSkip:active { color:#fff; border-color:#aaa; }
  #nameHint { color:#555; font:10px "Courier New", monospace; letter-spacing:1px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="448" height="560"></canvas>
  <div id="scan"></div>
  <div id="nameEntry" aria-hidden="true">
    <label for="nameInput">ENTER NAME</label>
    <input id="nameInput" type="text" maxlength="20" autocomplete="off" autocorrect="off"
           autocapitalize="characters" spellcheck="false" placeholder="PLAYER" inputmode="text">
    <div class="row">
      <button type="button" id="nameSkip">TAP TO SKIP</button>
    </div>
    <div id="nameHint">ENTER TO CONFIRM</div>
  </div>
</div>
<div id="hint">arrows / wasd &middot; swipe on touch &middot; m mute &middot; p pause</div>

<script>
"use strict";
/* ============================================================
   PAKU PAKU — a faithful maze-chase arcade game
   Single file. No dependencies. Runs offline.
   All tuning lives in CONFIG. Rename via GAME_TITLE.
   ============================================================ */

const GAME_TITLE = "PAKU PAKU";

const CONFIG = {
  tile: 16,
  hudTop: 32,               // px reserved above maze
  playerSpeed: 2.2,         // px per 60Hz tick
  ghostSpeed: 2.05,
  frightSpeed: 1.25,
  eyesSpeed: 4.0,
  tunnelSpeed: 1.1,
  speedRampPerLevel: 0.05,  // +5% per level, capped
  speedRampCap: 1.25,
  frightTimeBase: 6.0,      // seconds at level 1
  frightTimeMin: 1.5,
  frightFlash: 2.0,         // flashing during final seconds
  modeWaves: [7,20,7,20,5,20,5,Infinity], // scatter,chase,scatter,...
  releaseDelays: [0, 1.5, 4.5, 8.0],      // seconds per ghost
  extraLifeAt: 10000,
  lives: 3,
  leaderboardSize: 10,
};

/* ---- Maze: 28 x 31. '#' wall, '.' dot, 'o' power, ' ' path, '=' ghost door ---- */
const MAP_SRC = [
"############################",
"#............##............#",
"#.####.#####.##.#####.####.#",
"#o####.#####.##.#####.####o#",
"#.####.#####.##.#####.####.#",
"#..........................#",
"#.####.##.########.##.####.#",
"#.####.##.########.##.####.#",
"#......##....##....##......#",
"######.##### ## #####.######",
"######.##### ## #####.######",
"######.##          ##.######",
"######.## ###==### ##.######",
"######.## #      # ##.######",
"      .   #      #   .      ",
"######.## #      # ##.######",
"######.## ######## ##.######",
"######.##          ##.######",
"######.## ######## ##.######",
"######.## ######## ##.######",
"#............##............#",
"#.####.#####.##.#####.####.#",
"#.####.#####.##.#####.####.#",
"#o..##.......  .......##..o#",
"###.##.##.########.##.##.###",
"###.##.##.########.##.##.###",
"#......##....##....##......#",
"#.##########.##.##########.#",
"#.##########.##.##########.#",
"#..........................#",
"############################",
];

const T = CONFIG.tile, COLS = 28, ROWS = 31, HUD = CONFIG.hudTop;
const TUNNEL_ROW = 14;
const DOOR = { c: 13, r: 12 };           // left door tile (13 & 14 are door)
const HOME = { c: 13, r: 11 };           // just above door — eyes target / exit point
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
const nameEntryEl = document.getElementById("nameEntry");
const nameInputEl = document.getElementById("nameInput");
const nameSkipEl = document.getElementById("nameSkip");

/* ================= AUDIO — synthesized, no samples ================= */
const AudioSys = (() => {
  let ac = null, master = null, muted = false;
  let sirenOsc = null, sirenGain = null, sirenMode = "";
  function ensure() {
    if (!ac) {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = 0.25; master.connect(ac.destination);
    }
    if (ac.state === "suspended") ac.resume();
  }
  function blip(freq, dur, type="square", vol=1, slide=0) {
    if (muted || !ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, ac.currentTime + dur);
    g.gain.setValueAtTime(0.5 * vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime + dur);
  }
  let wak = false;
  return {
    ensure,
    toggleMute() { muted = !muted; if (sirenGain) sirenGain.gain.value = muted ? 0 : 0.05; return muted; },
    get muted() { return muted; },
    waka()      { wak = !wak; blip(wak ? 520 : 380, 0.07, "square", 0.7); },
    power()     { blip(200, 0.4, "sawtooth", 0.8, 300); },
    eatGhost()  { blip(300, 0.12, "square", 1, 500); setTimeout(()=>blip(700,0.15,"square",1,400), 60); },
    death()     { for (let i=0;i<6;i++) setTimeout(()=>blip(600-i*85, 0.16, "sawtooth", 0.9, -60), i*110); },
    jingle()    { const n=[392,523,659,784,659,784]; n.forEach((f,i)=>setTimeout(()=>blip(f,0.14,"triangle",0.9), i*130)); },
    extraLife() { [880,1100,1320].forEach((f,i)=>setTimeout(()=>blip(f,0.1,"square",0.8), i*90)); },
    siren(mode) { // "" | "normal" | "fright"
      if (!ac) return;
      if (mode === sirenMode) return;
      sirenMode = mode;
      if (sirenOsc) { try { sirenOsc.stop(); } catch(e){} sirenOsc = null; }
      if (!mode) return;
      sirenOsc = ac.createOscillator(); sirenGain = ac.createGain();
      const lfo = ac.createOscillator(), lfoG = ac.createGain();
      sirenOsc.type = "triangle";
      sirenOsc.frequency.value = mode === "fright" ? 320 : 180;
      lfo.frequency.value = mode === "fright" ? 6 : 1.2;
      lfoG.gain.value = mode === "fright" ? 60 : 40;
      lfo.connect(lfoG); lfoG.connect(sirenOsc.frequency);
      sirenGain.gain.value = muted ? 0 : 0.05;
      sirenOsc.connect(sirenGain); sirenGain.connect(master);
      sirenOsc.start(); lfo.start();
    },
  };
})();

/* ================= MAP STATE ================= */
let grid = [], dotsLeft = 0;
function loadMap() {
  grid = MAP_SRC.map(row => row.split(""));
  dotsLeft = 0;
  for (const row of grid) for (const ch of row) if (ch === "." || ch === "o") dotsLeft++;
}
const isWall = (c, r, canDoor=false) => {
  if (r === TUNNEL_ROW && (c < 0 || c >= COLS)) return false; // tunnel wrap
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true;
  const ch = grid[r][c];
  if (ch === "=") return !canDoor;
  return ch === "#";
};

/* ================= HELPERS ================= */
const DIRS = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
const OPP  = { up:"down", down:"up", left:"right", right:"left" };
const tileOf = e => ({ c: Math.floor(e.x / T), r: Math.floor(e.y / T) });
const centerOf = (c, r) => ({ x: c*T + T/2, y: r*T + T/2 });
const dist2 = (a, b) => (a.x-b.x)**2 + (a.y-b.y)**2;
const wrapX = x => (x < -T/2) ? COLS*T + T/2 - 1 : (x > COLS*T + T/2) ? -T/2 + 1 : x;

/* Move an entity 1px at a time; turn only at tile centers. Keeps grid alignment exact. */
function stepEntity(e, speed, canDoor=false) {
  e.acc = (e.acc || 0) + speed;
  while (e.acc >= 1) {
    e.acc -= 1;
    const { c, r } = tileOf(e);
    const cen = centerOf(c, r);
    const atCenter = Math.abs(e.x - cen.x) < 0.5 && Math.abs(e.y - cen.y) < 0.5;
    if (atCenter) {
      e.x = cen.x; e.y = cen.y;
      if (e.decide) e.decide();                       // ghosts pick a direction here
      const want = e.nextDir;
      if (want && !isWall(c + DIRS[want].x, r + DIRS[want].y, canDoor)) { e.dir = want; e.nextDir = null; }
      if (!e.dir || isWall(c + DIRS[e.dir].x, r + DIRS[e.dir].y, canDoor)) { e.moving = false; e.acc = 0; return; }
    } else if (e.nextDir && e.dir && e.nextDir === OPP[e.dir]) {
      e.dir = e.nextDir; e.nextDir = null;            // reversing is allowed mid-tile
    }
    if (!e.dir) { e.moving = false; e.acc = 0; return; }
    e.moving = true;
    e.x += DIRS[e.dir].x; e.y += DIRS[e.dir].y;
    e.x = wrapX(e.x);
  }
}

/* ================= GAME STATE ================= */
const G = {
  state: "TITLE",          // TITLE READY PLAY DYING CLEAR GAMEOVER INITIALS BOARD
  score: 0, high: 0, lives: 0, level: 1,
  frames: 0, stateT: 0, freeze: 0,
  fright: 0, ghostCombo: 0,
  modeIndex: 0, modeT: 0,  // scatter/chase schedule
  paused: false, awardedLife: false,
  popups: [],              // floating score text
  board: [ {name:"AAA", score:1500} ], // seeded so the top spot looks beatable
  boardStatus: "ready",    // ready | loading
  boardOffline: false,
  pendingScore: 0,         // score waiting for name entry
  flashT: 0,
};

const player = { x:0, y:0, dir:null, nextDir:null, mouth:0, deathT:0, moving:false, acc:0 };

function makeGhost(name, color, scatter, houseCol) {
  return { name, color, scatter, houseCol,
    x:0, y:0, dir:"left", nextDir:null, acc:0, moving:true,
    mode:"house",           // house | exiting | active | eaten
    releaseT:0, bob:0,
    decide: null };
}
const ghosts = [
  makeGhost("chaser",   "#ff2121", {c:26,r:1},  13),
  makeGhost("ambusher", "#ffb8ff", {c:1, r:1},  13),
  makeGhost("flanker",  "#21ffff", {c:26,r:29}, 11),
  makeGhost("shy",      "#ffb852", {c:1, r:29}, 16),
];

function speedScale() {
  return Math.min(CONFIG.speedRampCap, 1 + (G.level - 1) * CONFIG.speedRampPerLevel);
}
function frightTime() {
  return Math.max(CONFIG.frightTimeMin, CONFIG.frightTimeBase - (G.level - 1) * 0.6);
}
function currentWave() {
  return G.modeIndex % 2 === 0 ? "scatter" : "chase";
}

/* ---- Ghost AI: the four personalities ---- */
function ghostTarget(g) {
  if (g.mode === "eaten") return HOME;
  if (G.fright > 0) return null;                 // random at intersections
  if (currentWave() === "scatter") return g.scatter;
  const pt = tileOf(player);
  const pd = player.dir ? DIRS[player.dir] : DIRS.left;
  switch (g.name) {
    case "chaser":   return pt;                                        // straight at you
    case "ambusher": return { c: pt.c + pd.x*4, r: pt.r + pd.y*4 };    // 4 ahead of your nose
    case "flanker": {                                                   // pincer via chaser
      const b = tileOf(ghosts[0]);
      const ahead = { c: pt.c + pd.x*2, r: pt.r + pd.y*2 };
      return { c: ahead.c + (ahead.c - b.c), r: ahead.r + (ahead.r - b.r) };
    }
    case "shy": {                                                       // bold far, cowardly close
      const gt = tileOf(g);
      const d2 = (gt.c-pt.c)**2 + (gt.r-pt.r)**2;
      return d2 > 64 ? pt : g.scatter;
    }
  }
}

function ghostDecide(g) {
  const { c, r } = tileOf(g);
  const canDoor = g.mode === "eaten";
  const opts = [];
  for (const d of ["up","left","down","right"]) {
    if (d === OPP[g.dir]) continue;
    if (!isWall(c + DIRS[d].x, r + DIRS[d].y, canDoor)) opts.push(d);
  }
  if (!opts.length) { g.nextDir = OPP[g.dir]; return; }
  let pick;
  const target = ghostTarget(g);
  if (!target) pick = opts[(Math.random() * opts.length) | 0];         // frightened
  else {
    let best = Infinity;
    for (const d of opts) {
      const nc = centerOf(c + DIRS[d].x, r + DIRS[d].y);
      const tc = centerOf(target.c, target.r);
      const dd = dist2(nc, tc);
      if (dd < best) { best = dd; pick = d; }
    }
  }
  g.nextDir = pick;
}

function reverseGhosts() {
  for (const g of ghosts) if (g.mode === "active") g.nextDir = OPP[g.dir];
}

/* ================= RESETS ================= */
function resetPositions(fullRelease=false) {
  const pc = centerOf(13, 23); player.x = pc.x; player.y = pc.y;
  player.dir = null; player.nextDir = "left"; player.mouth = 0; player.acc = 0;
  ghosts.forEach((g, i) => {
    g.acc = 0; g.nextDir = null; g.bob = 0;
    if (i === 0) { const h = centerOf(HOME.c, HOME.r); g.x = h.x; g.y = h.y; g.mode = "active"; g.dir = "left"; g.decide = () => ghostDecide(g); }
    else {
      const h = centerOf(g.houseCol, 14); g.x = h.x; g.y = h.y;
      g.mode = "house"; g.dir = "up"; g.decide = null;
      g.releaseT = CONFIG.releaseDelays[i] * (fullRelease ? 0.4 : 1);
    }
  });
  G.fright = 0; G.ghostCombo = 0; G.modeIndex = 0; G.modeT = 0;
  AudioSys.siren("");
}

function startLevel(fresh) {
  if (fresh) loadMap();
  resetPositions();
  setState("READY");
  AudioSys.jingle();
}

function newGame() {
  G.score = 0; G.lives = CONFIG.lives; G.level = 1; G.awardedLife = false; G.popups = [];
  startLevel(true);
}

function setState(s) { G.state = s; G.stateT = 0; }

function addScore(n) {
  G.score += n;
  if (G.score > G.high) G.high = G.score;
  if (!G.awardedLife && G.score >= CONFIG.extraLifeAt) { G.awardedLife = true; G.lives++; AudioSys.extraLife(); }
}

function popup(x, y, text, color="#21ffff") { G.popups.push({ x, y, text, color, t: 1 }); }

/* ================= UPDATE ================= */
function update(dt) {
  G.stateT += dt;
  if (G.freeze > 0) { G.freeze -= dt; return; }

  switch (G.state) {
    case "TITLE": break;
    case "READY": if (G.stateT > 2.1) setState("PLAY"); break;
    case "PLAY": updatePlay(dt); break;
    case "DYING":
      player.deathT += dt;
      if (player.deathT > 1.6) {
        G.lives--;
        if (G.lives <= 0) { finishGame(); }
        else { resetPositions(true); setState("READY"); }
      }
      break;
    case "CLEAR":
      if (G.stateT > 2.2) { G.level++; startLevel(true); }
      break;
    case "GAMEOVER": if (G.stateT > 2.5) afterGameOver(); break;
    case "INITIALS": break;
    case "BOARD": if (G.stateT > 8) setState("TITLE"); break;
  }

  // Floating score popups always tick
  for (const p of G.popups) p.t -= dt * 0.9;
  G.popups = G.popups.filter(p => p.t > 0);
  G.flashT += dt;
}

function finishGame() {
  setState("GAMEOVER");
  AudioSys.siren("");
}
function sanitizeName(raw) {
  const s = String(raw ?? "")
    .replace(/[\u0000-\u001F\u007F]/g, "")
    .trim()
    .slice(0, 20);
  return s || "PLAYER";
}
function formatBoardName(name, maxLen) {
  const s = String(name || "");
  const max = maxLen || 14;
  return s.length > max ? s.slice(0, max - 1) + "\u2026" : s;
}
function showNameEntry() {
  if (!nameEntryEl || !nameInputEl) return;
  nameEntryEl.classList.add("show");
  nameEntryEl.setAttribute("aria-hidden", "false");
  nameInputEl.value = "";
  setTimeout(() => { try { nameInputEl.focus(); } catch (e) {} }, 50);
}
function hideNameEntry() {
  if (!nameEntryEl || !nameInputEl) return;
  nameEntryEl.classList.remove("show");
  nameEntryEl.setAttribute("aria-hidden", "true");
  try { nameInputEl.blur(); } catch (e) {}
}
function pushLocalScore(name, score) {
  G.board.push({ name, score });
  G.board.sort((a, b) => b.score - a.score);
  G.board = G.board.slice(0, CONFIG.leaderboardSize);
}
function afterGameOver() {
  const qualifies = G.board.length < CONFIG.leaderboardSize || G.score > G.board[G.board.length - 1].score;
  if (G.score > 0 && qualifies) {
    G.pendingScore = G.score;
    setState("INITIALS");
    showNameEntry();
  } else {
    enterBoard();
  }
}
function commitName(raw) {
  const name = sanitizeName(raw);
  const score = G.pendingScore || G.score;
  hideNameEntry();
  pushLocalScore(name, score);
  G.pendingScore = 0;
  setState("BOARD");
  G.boardStatus = "loading";
  G.boardOffline = false;
  // POST to global board; fall back to local session scores on failure
  Promise.resolve()
    .then(() => fetch("/api/leaderboard", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, score }),
    }))
    .then(r => { if (!r.ok) throw new Error("post failed"); return r.json(); })
    .then(rows => {
      if (Array.isArray(rows)) G.board = rows.slice(0, CONFIG.leaderboardSize);
      G.boardOffline = false;
      G.boardStatus = "ready";
    })
    .catch(() => {
      G.boardOffline = true;
      G.boardStatus = "ready";
    });
}
function enterBoard() {
  hideNameEntry();
  setState("BOARD");
  G.boardStatus = "loading";
  G.boardOffline = false;
  Promise.resolve()
    .then(() => fetch("/api/leaderboard"))
    .then(r => { if (!r.ok) throw new Error("get failed"); return r.json(); })
    .then(rows => {
      if (Array.isArray(rows) && rows.length) G.board = rows.slice(0, CONFIG.leaderboardSize);
      G.boardOffline = false;
      G.boardStatus = "ready";
    })
    .catch(() => {
      G.boardOffline = true;
      G.boardStatus = "ready";
    });
}
// Back-compat alias used by older call sites / tests
function commitInitials() { commitName(nameInputEl ? nameInputEl.value : ""); }

function updatePlay(dt) {
  const scale = speedScale();

  // Scatter/chase schedule pauses while frightened
  if (G.fright > 0) {
    G.fright -= dt;
    if (G.fright <= 0) { G.fright = 0; G.ghostCombo = 0; }
  } else {
    G.modeT += dt;
    const wave = CONFIG.modeWaves[Math.min(G.modeIndex, CONFIG.modeWaves.length - 1)];
    if (G.modeT >= wave) { G.modeT = 0; G.modeIndex++; reverseGhosts(); }
  }
  AudioSys.siren(G.fright > 0 ? "fright" : "normal");

  /* -- player -- */
  const pt0 = tileOf(player);
  const inTunnelP = pt0.r === TUNNEL_ROW && (pt0.c <= 5 || pt0.c >= 22);
  stepEntity(player, CONFIG.playerSpeed * scale * (inTunnelP ? 0.85 : 1));
  if (player.moving) player.mouth += dt * 12;

  // eat dots
  const pt = tileOf(player);
  if (pt.c >= 0 && pt.c < COLS) {
    const ch = grid[pt.r][pt.c];
    if (ch === "." || ch === "o") {
      grid[pt.r][pt.c] = " "; dotsLeft--;
      if (ch === ".") { addScore(10); AudioSys.waka(); }
      else {
        addScore(50); AudioSys.power();
        G.fright = frightTime(); G.ghostCombo = 0;
        reverseGhosts();
      }
      if (dotsLeft <= 0) { setState("CLEAR"); AudioSys.siren(""); return; }
    }
  }

  /* -- ghosts -- */
  for (let i = 0; i < ghosts.length; i++) {
    const g = ghosts[i];
    if (g.mode === "house") {
      g.releaseT -= dt; g.bob += dt * 6;
      g.y = centerOf(g.houseCol, 14).y + Math.sin(g.bob) * 3;
      if (g.releaseT <= 0) g.mode = "exiting";
    } else if (g.mode === "exiting") {
      const doorX = centerOf(13, 14).x + T/2;      // center between door tiles
      const exitY = centerOf(HOME.c, HOME.r).y;
      if (Math.abs(g.x - doorX) > 1) { g.x += Math.sign(doorX - g.x) * 1.5; g.dir = doorX > g.x ? "right" : "left"; }
      else if (g.y > exitY) { g.x = doorX; g.y -= 1.5; g.dir = "up"; }
      else {
        const h = centerOf(HOME.c, HOME.r); g.x = h.x; g.y = h.y;
        g.mode = "active"; g.dir = "left"; g.acc = 0; g.decide = () => ghostDecide(g);
      }
    } else {
      const gt = tileOf(g);
      const inTunnel = gt.r === TUNNEL_ROW && (gt.c <= 5 || gt.c >= 22);
      let sp = CONFIG.ghostSpeed * scale;
      if (g.mode === "eaten") sp = CONFIG.eyesSpeed;
      else if (G.fright > 0) sp = CONFIG.frightSpeed;
      else if (inTunnel) sp = CONFIG.tunnelSpeed;
      stepEntity(g, sp, g.mode === "eaten");

      if (g.mode === "eaten") {
        const home = centerOf(HOME.c, HOME.r);
        if (dist2(g, home) < 9) {  // arrived — dive into house and respawn
          const h = centerOf(g.houseCol, 14); g.x = h.x; g.y = h.y;
          g.mode = "house"; g.releaseT = 1.0; g.decide = null;
        }
      }
    }

    // collision with player
    if ((g.mode === "active") && dist2(g, player) < 100) {
      if (G.fright > 0) {
        g.mode = "eaten";
        const pts = 200 * Math.pow(2, G.ghostCombo++);
        addScore(pts); popup(g.x, g.y, String(pts));
        AudioSys.eatGhost(); G.freeze = 0.35;
      } else {
        setState("DYING"); player.deathT = 0;
        AudioSys.siren(""); AudioSys.death();
        return;
      }
    }
  }
}

/* ================= RENDER ================= */
function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, cvs.width, cvs.height);

  drawHUD();
  ctx.save();
  ctx.translate(0, HUD);

  if (G.state === "TITLE") { drawTitle(); ctx.restore(); return; }
  if (G.state === "INITIALS" || G.state === "BOARD") { drawBoard(); ctx.restore(); return; }

  drawMaze();
  drawDots();

  for (const g of ghosts) drawGhost(g);
  if (G.state !== "GAMEOVER") drawPlayer();

  for (const p of G.popups) {
    ctx.fillStyle = p.color; ctx.globalAlpha = Math.min(1, p.t);
    ctx.font = "bold 12px monospace"; ctx.textAlign = "center";
    ctx.fillText(p.text, p.x, p.y - (1 - p.t) * 18);
    ctx.globalAlpha = 1;
  }

  ctx.font = "bold 16px monospace"; ctx.textAlign = "center";
  if (G.state === "READY")    { ctx.fillStyle = "#ffff00"; ctx.fillText("READY!", COLS*T/2, 17.6*T); }
  if (G.state === "GAMEOVER") { ctx.fillStyle = "#ff2121"; ctx.fillText("GAME OVER", COLS*T/2, 17.6*T); }
  if (G.paused)               { ctx.fillStyle = "#fff";    ctx.fillText("PAUSED", COLS*T/2, 17.6*T); }
  ctx.restore();
}

function drawHUD() {
  ctx.font = "bold 13px monospace"; ctx.fillStyle = "#fff";
  ctx.textAlign = "left";  ctx.fillText("SCORE " + G.score, 12, 21);
  ctx.textAlign = "center";ctx.fillText("HI " + G.high, cvs.width/2, 21);
  ctx.textAlign = "right"; ctx.fillText("LV " + G.level + (AudioSys.muted ? "  \u{1F507}" : ""), cvs.width - 12, 21);
  // lives at bottom
  for (let i = 0; i < Math.max(0, G.lives - 1); i++) {
    drawArcMan(24 + i * 22, HUD + ROWS*T + 16, 7, "right", 0.25, "#ffcc33");
  }
}
